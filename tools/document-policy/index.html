<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>文档隐私链接生成 - 上传文档生成正式链接</title>
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="上传 Word 文档或粘贴隐私协议正文，生成可公开访问的正式隐私链接。" />
  <link rel="canonical" href="https://privacy.hnchpower.cn/tools/document-policy/" />
  <meta property="og:title" content="文档隐私链接生成" />
  <meta property="og:description" content="上传 Word 文档或粘贴隐私协议正文，生成可公开访问的正式隐私链接。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://privacy.hnchpower.cn/tools/document-policy/" />
  <link rel="icon" href="../../assets/icons/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="../../assets/icons/favicon.ico" sizes="any" />
  <link rel="icon" href="../../assets/icons/favicon-32x32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="../../assets/icons/favicon-16x16.png" sizes="16x16" type="image/png" />
  <link rel="apple-touch-icon" href="../../assets/icons/apple-touch-icon.png" sizes="180x180" />
  <link rel="stylesheet" href="document-policy.css" />
</head>
<body class="doc-tool-page">
  <header class="doc-tool-header">
    <div class="doc-tool-header-inner">
      <div>
        <h1>文档隐私链接生成</h1>
        <p>运营上传 Word 文档或粘贴正文，确认预览后一键生成正式链接。</p>
      </div>
      <div class="doc-tool-actions">
        <a class="doc-btn doc-btn-secondary" href="../../index.html">工具首页</a>
        <a id="account-entry-link" class="doc-btn doc-btn-secondary" href="../../account.html">登录 / 注册</a>
      </div>
    </div>
  </header>

  <main class="doc-tool-main">
    <section class="doc-panel doc-form-panel" aria-label="文档发布设置">
      <h2>发布设置</h2>
      <p class="doc-panel-subtitle">支持 .docx、.html、.txt。Word 文档会在浏览器中转换为网页预览。</p>

      <div class="doc-field">
        <label for="policy-title">链接标题</label>
        <input id="policy-title" type="text" maxlength="80" placeholder="例如：六界仙尊隐私政策" />
        <span id="hint-title" class="doc-hint"></span>
      </div>

      <div class="doc-field">
        <label for="policy-file">上传文档</label>
        <input id="policy-file" type="file" accept=".docx,.html,.htm,.txt,text/html,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
        <span id="hint-file" class="doc-hint">选择文档后会自动生成右侧预览；也可以直接粘贴正文。</span>
      </div>

      <div class="doc-field">
        <label for="policy-source">粘贴正文 / HTML</label>
        <textarea id="policy-source" rows="12" placeholder="可直接粘贴隐私协议正文，或粘贴已经整理好的 HTML。"></textarea>
        <span id="hint-source" class="doc-hint"></span>
      </div>

      <div class="doc-publish-box">
        <button id="btn-publish-doc" class="doc-btn doc-btn-primary" type="button">生成正式链接</button>
        <p>发布需要登录。生成后会保存正文并返回可访问链接。</p>
      </div>

      <div class="doc-result" aria-label="生成结果">
        <label for="published-doc-url">正式链接</label>
        <div class="doc-result-row">
          <input id="published-doc-url" type="text" readonly />
          <button id="btn-copy-doc-link" class="doc-btn doc-btn-secondary" type="button">复制</button>
        </div>
        <p id="publish-doc-time">最近一次生成：尚未生成</p>
      </div>
    </section>

    <section class="doc-panel doc-preview-panel" aria-label="文档预览">
      <div class="doc-preview-head">
        <div>
          <h2>预览</h2>
          <p class="doc-panel-subtitle">发布前请核对内容是否完整、排版是否可读。</p>
        </div>
        <button id="btn-clear-doc" class="doc-btn doc-btn-secondary" type="button">清空</button>
      </div>
      <article id="doc-preview" class="doc-preview" tabindex="0">
        <p class="doc-empty">上传文档或粘贴正文后，这里会显示正式链接中的内容。</p>
      </article>
    </section>
  </main>

  <div id="doc-toast" class="doc-toast" role="status" aria-live="polite" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js"></script>
  <script src="../../supabase-config.js"></script>
  <script src="../../auth.js"></script>
  <script src="../../header-account-link.js"></script>
  <script src="../../page-visit-log.js"></script>
  <script src="document-policy.js"></script>
</body>
</html>
